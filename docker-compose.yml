services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie_recommendation_api
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      # Veritabanı yerel makinedeyse 'host.docker.internal' üzerinden bağlanmasını sağlarız
      - DB_HOST=host.docker.internal
      # Ollama yerel makinedeyse container'dan erişim sağlamak için OLLAMA_HOST tanımlarız
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

